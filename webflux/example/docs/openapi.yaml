          description: 415 unsupported media type error. See the WebFlux example tests
            for concrete triggering inputs.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ExtendedProblemDetail"
              examples:
                example:
                  summary: Unsupported media type
