openapi: 3.1.0
info:
  title: Extended Problem Detail Boot 4 WebFlux Example API
  description: Example Spring Boot 4 WebFlux endpoints that demonstrate Extended Problem
    Detail responses.
  version: 1.1.0
servers:
- url: /
  description: Relative server URL
tags:
- name: WebFlux Example
  description: Endpoints that intentionally trigger different WebFlux and validation
    exceptions.
paths:
  /flux-extended-problem-detail/web-exchange-bind-exception:
    post:
      tags:
      - WebFlux Example
      description: "Real trigger from tests: POST /flux-extended-problem-detail/web-exchange-bind-exception\
        \ with application/json body {\"name\":\"abc\",\"password\":\"123\"}. For\
        \ the exact request setup and assertions, see src/test/java/io/github/sbracely/extended/problem/detail/webflux/example/controller/FluxControllerTests.java."
      operationId: webExchangeBindException
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FluxProblemDetailRequest"
        required: true
      responses:
        "400":
          description: 400 validation error. See the WebFlux example tests for concrete
            triggering inputs.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ExtendedProblemDetail"
              examples:
                example:
                  summary: Validation error
                  value:
                    title: Bad Request
                    status: 400
                    detail: Invalid request content.
                    instance: /flux-extended-problem-detail/web-exchange-bind-exception
                    errors:
                    - type: PARAMETER
                      target: name
                      message: Name length must be between 6-10
                    - type: PARAMETER
                      target: age
                      message: Age cannot be null
                    - type: PARAMETER
                      target: password
                      message: Password and confirm password do not match
                    - type: PARAMETER
                      target: confirmPassword
                      message: Password and confirm password do not match
  /flux-extended-problem-detail/unsupported-media-type-status-exception:
