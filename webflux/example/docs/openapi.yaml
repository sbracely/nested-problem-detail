openapi: 3.1.0
info:
  title: Extended Problem Detail Boot 3 WebFlux Example API
  description: Example Spring Boot 3 WebFlux endpoints that demonstrate Extended Problem
    Detail responses.
  version: 1.1.0
servers:
- url: /
  description: Relative server URL
tags:
- name: WebFlux Example
  description: Endpoints that intentionally trigger different WebFlux and validation
    exceptions.
- name: Supplemental Operations
  description: "Documented operations added outside FluxExtendedProblemDetailController,\
    \ including framework fallback and other supplemental endpoints."
paths:
  /flux-extended-problem-detail/web-exchange-bind-exception:
    post:
      tags:
      - WebFlux Example
      operationId: webExchangeBindException
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FluxProblemDetailRequest"
        required: true
      responses:
        "400":
          description: WebExchangeBindException
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              examples:
                example:
                  description: example
                  value:
                    title: Bad Request
                    status: 400
                    detail: Invalid request content.
                    instance: /flux-extended-problem-detail/web-exchange-bind-exception
                    errors:
                    - type: MODEL_ATTRIBUTE
                      target: name
                      message: Name length must be between 6-10
                    - type: MODEL_ATTRIBUTE
                      target: age
                      message: Age cannot be null
                    - type: MODEL_ATTRIBUTE
                      target: password
                      message: Password and confirm password do not match
                    - type: MODEL_ATTRIBUTE
                      target: confirmPassword
                      message: Password and confirm password do not match
                    - type: MODEL_ATTRIBUTE
                      target: address.street
                      message: Street cannot be blank
  /flux-extended-problem-detail/unsupported-media-type-status-exception:
    post:
      tags:
      - WebFlux Example
      operationId: unsupportedMediaTypeStatusException
      responses:
        "415":
          description: UnsupportedMediaTypeStatusException
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              examples:
                example:
                  description: example
                  value:
                    title: Unsupported Media Type
                    status: 415
                    instance: /flux-extended-problem-detail/unsupported-media-type-status-exception
  /flux-extended-problem-detail/payload-too-large-exception:
    post:
      tags:
      - WebFlux Example
      operationId: payloadTooLargeException
      requestBody:
        content:
          application/json:
            schema:
              type: string
              format: byte
        required: true
      responses:
        "413":
          description: PayloadTooLargeException
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              examples:
                example:
                  description: example
                  value:
                    title: Content Too Large
                    status: 413
                    instance: /flux-extended-problem-detail/payload-too-large-exception
  /flux-extended-problem-detail/handler-method-validation-exception-request-part:
    post:
      tags:
      - WebFlux Example
      operationId: handlerMethodValidationExceptionRequestPart
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                filePart:
                  type: string
                  format: binary
      responses:
        "400":
          description: HandlerMethodValidationException
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              examples:
                example:
                  description: example
                  value:
                    title: Bad Request
                    status: 400
                    detail: Validation failure
                    instance: /flux-extended-problem-detail/handler-method-validation-exception-request-part
                    errors:
                    - type: REQUEST_PART
                      target: file
                      message: File cannot be empty
  /flux-extended-problem-detail/handler-method-validation-exception-request-body:
    post:
      tags:
      - WebFlux Example
      operationId: handlerMethodValidationExceptionRequestBody
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FluxProblemDetailRequest"
        required: true
      responses:
        "400":
          description: HandlerMethodValidationException
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              examples:
                example:
                  description: example
                  value:
                    title: Bad Request
                    status: 400
                    detail: Validation failure
                    instance: /flux-extended-problem-detail/handler-method-validation-exception-request-body
                    errors:
                    - type: REQUEST_BODY
                      target: password
                      message: Password cannot be empty
  /flux-extended-problem-detail/handler-method-validation-exception-request-body-validation-result:
    post:
      tags:
      - WebFlux Example
      operationId: handlerMethodValidationExceptionRequestBodyValidationResult
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
        required: true
      responses:
        "400":
          description: HandlerMethodValidationException
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              examples:
                example:
                  description: example
                  value:
                    title: Bad Request
                    status: 400
                    detail: Validation failure
                    instance: /flux-extended-problem-detail/handler-method-validation-exception-request-body-validation-result
                    errors:
                    - type: REQUEST_BODY
                      message: Element cannot contain empty values
  /flux-extended-problem-detail/content-too-large-exception:
    post:
      tags:
      - WebFlux Example
      operationId: contentTooLargeException
      requestBody:
        content:
          application/json:
            schema:
              type: string
              format: byte
        required: true
      responses:
        "413":
          description: ContentTooLargeException
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              examples:
                example:
                  description: example
                  value:
                    title: Content Too Large
                    status: 413
                    instance: /flux-extended-problem-detail/content-too-large-exception
  /flux-extended-problem-detail/unsatisfied-request-parameter-exception:
    get:
      tags:
      - WebFlux Example
      operationId: unsatisfiedRequestParameterException
      parameters:
      - name: type
        in: query
        example: 1
      responses:
        "400":
          description: UnsatisfiedRequestParameterException
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              examples:
                example:
                  description: example
                  value:
                    title: Bad Request
                    status: 400
                    detail: Invalid request parameters.
                    instance: /flux-extended-problem-detail/unsatisfied-request-parameter-exception
  /flux-extended-problem-detail/server-web-input-exception:
    get:
      tags:
      - WebFlux Example
      operationId: serverWebInputException
      responses:
        "400":
          description: ServerWebInputException
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              examples:
                example:
                  description: example
                  value:
                    title: Bad Request
                    status: 400
                    detail: server web input error
                    instance: /flux-extended-problem-detail/server-web-input-exception
  /flux-extended-problem-detail/server-error-exception:
    get:
      tags:
      - WebFlux Example
      operationId: serverErrorException
      responses:
        "500":
          description: ServerErrorException
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              examples:
                example:
                  description: example
                  value:
                    title: Internal Server Error
                    status: 500
                    detail: server error
                    instance: /flux-extended-problem-detail/server-error-exception
  /flux-extended-problem-detail/response-status-exception:
    get:
      tags:
      - WebFlux Example
      operationId: responseStatusException
      responses:
        "400":
          description: ResponseStatusException
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              examples:
                example:
                  description: example
                  value:
                    title: Bad Request
                    status: 400
                    detail: exception
                    instance: /flux-extended-problem-detail/response-status-exception
  /flux-extended-problem-detail/not-acceptable-status-exception:
    get:
      tags:
      - WebFlux Example
      operationId: notAcceptableStatusException
      parameters:
      - name: Accept
        in: header
        example: application/xml
      responses:
        "406":
          description: NotAcceptableStatusException
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              examples:
                example:
                  description: example
                  value:
                    title: Not Acceptable
                    status: 406
                    detail: "Acceptable representations: [application/json]."
                    instance: /flux-extended-problem-detail/not-acceptable-status-exception
  /flux-extended-problem-detail/missing-request-value-exception:
    get:
      tags:
      - WebFlux Example
      operationId: missingRequestValueException
      parameters:
      - name: id
        in: query
        required: true
        schema:
          type: string
        example: 1
      responses:
        "400":
          description: MissingRequestValueException
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              examples:
                example:
                  summary: Validation error
                  description: example
                  value:
                    title: Bad Request
                    status: 400
                    detail: Required query parameter 'id' is not present.
                    instance: /flux-extended-problem-detail/missing-request-value-exception
  /flux-extended-problem-detail/method-validation-exception:
    get:
      tags:
      - WebFlux Example
      operationId: methodValidationException
      responses:
        "500":
          description: MethodValidationException
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              examples:
                example:
                  description: example
                  value:
                    title: Internal Server Error
                    status: 500
                    detail: Validation failed
                    instance: /flux-extended-problem-detail/method-validation-exception
  /flux-extended-problem-detail/method-not-allowed-exception:
    get:
      tags:
      - WebFlux Example
      operationId: methodNotAllowedException
      responses:
        "405":
          description: MethodNotAllowedException
          headers:
            Allow:
              style: simple
              schema:
                type: string
                example: GET
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              examples:
                example:
                  description: example
                  value:
                    title: Method Not Allowed
                    status: 405
                    detail: "Supported methods: [GET]"
                    instance: /flux-extended-problem-detail/method-not-allowed-exception
  /flux-extended-problem-detail/handler-method-validation-exception-request-param:
    get:
      tags:
      - WebFlux Example
      operationId: handlerMethodValidationExceptionRequestParam
      parameters:
      - name: param
        in: query
        required: true
        schema:
          type: string
          minLength: 1
      - name: value
        in: query
        required: true
        schema:
          type: string
          maxLength: 2147483647
          minLength: 5
      responses:
        "400":
          description: HandlerMethodValidationException
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              examples:
                example:
                  description: example
                  value:
                    title: Bad Request
                    status: 400
                    detail: Validation failure
                    instance: /flux-extended-problem-detail/handler-method-validation-exception-request-param
                    errors:
                    - type: QUERY_PARAMETER
                      target: param
                      message: Parameter cannot be empty
                    - type: QUERY_PARAMETER
                      target: value
                      message: Length must be at least 5
  /flux-extended-problem-detail/handler-method-validation-exception-request-header:
    get:
      tags:
      - WebFlux Example
      operationId: handlerMethodValidationExceptionRequestHeader
      parameters:
      - name: headerValue
        in: header
        required: true
        schema:
          type: string
          minLength: 1
      responses:
        "400":
          description: HandlerMethodValidationException
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              examples:
                example:
                  description: example
                  value:
                    title: Bad Request
                    status: 400
                    detail: Validation failure
                    instance: /flux-extended-problem-detail/handler-method-validation-exception-request-header
                    errors:
                    - type: HEADER
                      target: headerValue
                      message: Header cannot be empty
  /flux-extended-problem-detail/handler-method-validation-exception-path-variable/{id}:
    get:
      tags:
      - WebFlux Example
      operationId: handlerMethodValidationExceptionPathVariable
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          maxLength: 2147483647
          minLength: 5
        example: abc
      responses:
        "400":
          description: HandlerMethodValidationException
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              examples:
                example:
                  description: example
                  value:
                    title: Bad Request
                    status: 400
                    detail: Validation failure
                    instance: /flux-extended-problem-detail/handler-method-validation-exception-path-variable/abc
                    errors:
                    - type: PATH_VARIABLE
                      target: id
                      message: id length must be at least 5
  /flux-extended-problem-detail/handler-method-validation-exception-other:
    get:
      tags:
      - WebFlux Example
      operationId: handlerMethodValidationExceptionOther
      parameters:
      - name: sessionAttribute
        in: query
        required: true
        schema:
          type: string
          minLength: 1
      - name: value
        in: query
        required: true
        schema:
          type: string
          minLength: 1
      responses:
        "400":
          description: HandlerMethodValidationException
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              examples:
                example:
                  description: example
                  value:
                    title: Bad Request
                    status: 400
                    detail: Validation failure
                    instance: /flux-extended-problem-detail/handler-method-validation-exception-other
  /flux-extended-problem-detail/handler-method-validation-exception-model-attribute:
    get:
      tags:
      - WebFlux Example
      operationId: handlerMethodValidationExceptionModelAttribute
      parameters:
      - name: problemDetailRequest
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/FluxProblemDetailRequest"
      responses:
        "400":
          description: HandlerMethodValidationException
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              examples:
                example:
                  description: example
                  value:
                    title: Bad Request
                    status: 400
                    detail: Validation failure
                    instance: /flux-extended-problem-detail/handler-method-validation-exception-model-attribute
                    errors:
                    - type: MODEL_ATTRIBUTE
                      target: password
                      message: Password cannot be empty
  /flux-extended-problem-detail/handler-method-validation-exception-matrix/{id}:
    get:
      tags:
      - WebFlux Example
      operationId: handlerMethodValidationExceptionMatrixVariable
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        example: abc
      - name: list
        in: query
        required: true
        schema:
          type: array
          items:
            type: string
          maxItems: 2
          minItems: 0
      responses:
        "400":
          description: HandlerMethodValidationException
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              examples:
                example:
                  description: example
                  value:
                    title: Bad Request
                    status: 400
                    detail: Validation failure
                    instance: "/flux-extended-problem-detail/handler-method-validation-exception-matrix/abc;list=a,b,c"
                    errors:
                    - type: MATRIX_VARIABLE
                      target: list
                      message: list maximum size is 2
  /flux-extended-problem-detail/handler-method-validation-exception-cookie-value:
    get:
      tags:
      - WebFlux Example
      operationId: handlerMethodValidationExceptionCookieValue
      parameters:
      - name: cookieValue
        in: cookie
        required: true
        schema:
          type: string
          minLength: 1
      responses:
        "400":
          description: HandlerMethodValidationException
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              examples:
                example:
                  description: example
                  value:
                    title: Bad Request
                    status: 400
                    detail: Validation failure
                    instance: /flux-extended-problem-detail/handler-method-validation-exception-cookie-value
                    errors:
                    - type: COOKIE
                      target: cookieValue
                      message: cookie cannot be empty
  /flux-extended-problem-detail/extended-error-response-exception:
    get:
      tags:
      - WebFlux Example
      operationId: extendedErrorResponseException
      responses:
        "500":
          description: PayFailedException
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              examples:
                example:
                  description: example
                  value:
                    title: Payment failed
                    status: 500
                    detail: The payment request could not be processed.
                    instance: /flux-extended-problem-detail/extended-error-response-exception
                    errors:
                    - type: BUSINESS
                      message: Insufficient balance
                    - type: BUSINESS
                      message: Payment is too frequent
  /flux-extended-problem-detail/error-response-exception:
    get:
      tags:
      - WebFlux Example
      operationId: errorResponseException
      responses:
        "400":
          description: ErrorResponseException
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              examples:
                example:
                  description: example
                  value:
                    title: Error title
                    status: 400
                    detail: Error details
                    instance: /flux-extended-problem-detail/error-response-exception
                    errors:
                    - type: BUSINESS
                      message: Error message 1
                    - type: BUSINESS
                      message: Error message 2
  /flux-extended-problem-detail/no-resource-found:
    get:
      tags:
      - Supplemental Operations
      description: "Matches the documented example with the default WebFlux static-resource\
        \ fallback handling. If resource handling is customized or disabled, the same\
        \ request can produce a different fallback response shape."
      operationId: noResourceFoundException
      responses:
        "404":
          description: 404 no resource found error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              examples:
                example:
                  summary: No resource found
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: "No static resource {0}."
                    instance: /flux-extended-problem-detail/no-resource-found
components:
  schemas:
    ProblemDetail:
      type: object
      description: RFC 9457 problem detail extended with an errors array.
      properties:
        type:
          type: string
          format: uri
          description: Problem type URI.
        title:
          type: string
          description: Short summary of the problem.
        status:
          type: integer
          format: int32
          description: HTTP status code.
        detail:
          type: string
          description: Human-readable explanation for this occurrence.
        instance:
          type: string
          format: uri
          description: URI identifying the specific occurrence.
        errors:
          type: array
          description: Detailed validation or business errors.
          items:
            type: object
            description: Detailed error entry inside the Problem Detail response.
            properties:
              type:
                type: string
                description: Source of the error.
                enum:
                - QUERY_PARAMETER
                - PATH_VARIABLE
                - REQUEST_BODY
                - MODEL_ATTRIBUTE
                - REQUEST_PART
                - MATRIX_VARIABLE
                - COOKIE
                - HEADER
                - BUSINESS
              target:
                type: string
                description: "Field, parameter, cookie, header, or business target\
                  \ associated with the error."
              message:
                type: string
                description: Human-readable explanation of the error.
    FluxProblemDetailAddress:
      type: object
      description: Nested request payload used by validation examples.
      properties:
        street:
          type: string
          description: Street name used by nested validation examples.
          example: Main St
          minLength: 1
        geo:
          $ref: "#/components/schemas/FluxProblemDetailAddressGeo"
          description: Geo payload used by deeper nested validation examples.
      required:
      - geo
      - street
    FluxProblemDetailAddressGeo:
      type: object
      description: Geo payload used by deeper nested validation examples.
      properties:
        location:
          $ref: "#/components/schemas/FluxProblemDetailAddressLocation"
          description: Location payload used by deeper nested validation examples.
      required:
      - location
    FluxProblemDetailAddressLocation:
      type: object
      description: Location payload used by deeper nested validation examples.
      properties:
        code:
          type: string
          description: Location code used by deeper nested validation examples.
          example: LOC-100
          minLength: 1
      required:
      - code
    FluxProblemDetailRequest:
      type: object
      description: Sample request payload used by the example endpoints.
      properties:
        name:
          type: string
          description: User name used by validation examples.
          example: springdoc
          minLength: 1
        age:
          type: integer
          format: int32
          description: User age used by validation examples.
          example: 28
          maximum: 150
          minimum: 0
        password:
          type: string
          format: password
          description: Password used by custom validation examples.
          example: password123
        confirmPassword:
          type: string
          format: password
          description: Repeated password used by custom validation examples.
          example: password123
        address:
          $ref: "#/components/schemas/FluxProblemDetailAddress"
          description: Nested payload used by validation examples.
        addresses:
          type: array
          description: Nested collection payload used by validation examples.
          items:
            $ref: "#/components/schemas/FluxProblemDetailAddress"
      required:
      - address
      - age
      - name
