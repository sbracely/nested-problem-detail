name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 3.x
      - 4.x

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Verify
        run: ./mvnw -B verify
