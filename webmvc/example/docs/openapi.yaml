        required: true
        schema:
          $ref: "#/components/schemas/MvcProblemDetailRequest"
      responses:
        "415":
          description: 415 unsupported media type error. See the MVC example tests
            for concrete triggering inputs.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ExtendedProblemDetail"
              examples:
                example:
                  summary: Unsupported media type
                  value:
                    title: Unsupported Media Type
                    status: 415
                    detail: Content-Type 'null' is not supported.
                    instance: /mvc-extended-problem-detail/http-media-type-not-supported-exception
  /mvc-extended-problem-detail/http-media-type-not-acceptable-exception:
    put:
