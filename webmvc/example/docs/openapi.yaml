openapi: 3.1.0
info:
  title: Extended Problem Detail Boot 4 WebMVC Example API
  description: Example Spring Boot 4 WebMVC endpoints that demonstrate Extended Problem
    Detail responses.
  version: 1.1.0
servers:
- url: /
  description: Relative server URL
tags:
- name: WebMVC Example
  description: Endpoints that intentionally trigger different MVC and validation exceptions.
paths:
  /mvc-extended-problem-detail/missing-servlet-request-part-exception:
    put:
      tags:
      - WebMVC Example
      description: "Real trigger from tests: PUT multipart/form-data /mvc-extended-problem-detail/missing-servlet-request-part-exception\
        \ without file part. For the exact request setup and assertions, see src/test/java/io/github/sbracely/extended/problem/detail/webmvc/example/controller/MvcControllerTests.java."
      operationId: missingServletRequestPartException
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
              - file
      responses:
        "400":
          description: 400 missing request part error. See the MVC example tests for
            concrete triggering inputs.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ExtendedProblemDetail"
              examples:
                example:
                  summary: Missing request part
                  value:
                    title: Bad Request
                    status: 400
                    detail: Required part 'file' is not present.
                    instance: /mvc-extended-problem-detail/missing-servlet-request-part-exception
  /mvc-extended-problem-detail/http-media-type-not-supported-exception:
    put:
      tags:
      - WebMVC Example
      description: "Real trigger from tests: PUT /mvc-extended-problem-detail/http-media-type-not-supported-exception.\
        \ For the exact request setup and assertions, see src/test/java/io/github/sbracely/extended/problem/detail/webmvc/example/controller/MvcControllerTests.java."
      operationId: httpMediaTypeNotSupportedException
      parameters:
      - name: problemDetailRequest
